<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Moniteur">
<meta name="theme-color" content="#0e0f10">
<title>Moniteur de Tir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0e10; --bg2:#121417; --surface:#191c20; --surface-2:#21252b;
    --line:#2a2f36; --text:#f3f4f6; --muted:#9aa1ab; --faint:#6b727c;
    --red:#e2001a; --red-dim:#8f1018; --green:#27c481; --amber:#f5a623; --field:#3f6b52;
    --shadow:0 18px 50px rgba(0,0,0,.55);
    --mono:'SF Mono','SFMono-Regular',ui-monospace,'Roboto Mono','DejaVu Sans Mono',Menlo,Consolas,monospace;
    --disp:'Oswald','Arial Narrow',system-ui,sans-serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{background:radial-gradient(900px 600px at 50% -10%, #1a1d22 0%, transparent 60%), var(--bg);
    color:var(--text); font-family:var(--body); -webkit-font-smoothing:antialiased; overflow-x:hidden; overscroll-behavior:none;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.05;
    background:repeating-radial-gradient(circle at 80% 12%, transparent 0 38px, var(--text) 38px 39px);}
  #app{position:relative;z-index:1;max-width:560px;margin:0 auto;min-height:100%;
    padding:calc(env(safe-area-inset-top) + 14px) 18px calc(env(safe-area-inset-bottom) + 28px);}

  header{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .mark{width:34px;height:34px;flex:none;}
  .mark circle{fill:none;stroke-width:3;}
  .brand{flex:1;min-width:0;}
  .brand h1{font-family:var(--disp);font-weight:700;letter-spacing:.14em;font-size:18px;margin:0;text-transform:uppercase;}
  .brand p{margin:1px 0 0;font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--faint);}
  .icon-btn{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--text);
    width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:18px;cursor:pointer;transition:.18s;}
  .icon-btn:active{transform:scale(.92);background:var(--surface-2);}

  .view{animation:fade .32s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .crumb{font-family:var(--disp);text-transform:uppercase;letter-spacing:.18em;font-size:11px;color:var(--faint);margin:0 0 14px;}
  .crumb b{color:var(--red);font-weight:600;}

  .stack{display:flex;flex-direction:column;gap:14px;}
  .card{position:relative;border:1px solid var(--line);background:linear-gradient(180deg,var(--surface),var(--bg2));
    border-radius:18px;padding:22px 20px;cursor:pointer;overflow:hidden;transition:.2s;text-align:left;width:100%;color:var(--text);box-shadow:var(--shadow);}
  .card:active{transform:scale(.985);border-color:#3a4049;}
  .card .kicker{font-family:var(--disp);letter-spacing:.26em;font-size:10.5px;text-transform:uppercase;color:var(--red);font-weight:600;}
  .card .title{font-family:var(--disp);font-weight:600;font-size:25px;letter-spacing:.02em;margin:6px 0 4px;text-transform:uppercase;}
  .card .sub{font-size:13px;color:var(--muted);line-height:1.45;}
  .card .arrow{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:24px;}
  .card .ringghost{position:absolute;right:-30px;bottom:-40px;width:140px;height:140px;border-radius:50%;border:18px solid var(--surface-2);opacity:.5;}

  .dist-grid{display:flex;flex-direction:column;gap:12px;}
  .dist-card{display:flex;align-items:center;gap:16px;}
  .dist-num{font-family:var(--disp);font-weight:700;font-size:34px;line-height:1;min-width:78px;}
  .dist-num span{font-size:14px;color:var(--faint);font-weight:400;}
  .dist-meta{flex:1;}
  .dist-meta .t{font-family:var(--disp);text-transform:uppercase;letter-spacing:.1em;font-size:14px;font-weight:500;}
  .dist-meta .d{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}

  .prog-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;gap:12px;}
  .prog-head .h{font-family:var(--disp);text-transform:uppercase;font-weight:600;font-size:22px;letter-spacing:.04em;}
  .prog-head .meta{font-size:12px;color:var(--muted);margin-top:4px;}
  .badge-score{font-family:var(--disp);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:6px 11px;font-size:12px;color:var(--muted);white-space:nowrap;text-align:center;}
  .badge-score b{color:var(--text);font-size:15px;}

  .startall{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border:none;cursor:pointer;
    background:linear-gradient(180deg,var(--red),var(--red-dim));color:#fff;font-family:var(--disp);font-weight:600;
    letter-spacing:.1em;text-transform:uppercase;font-size:14px;padding:16px;border-radius:14px;margin-bottom:18px;
    box-shadow:0 12px 30px rgba(226,0,26,.32);transition:.18s;}
  .startall:active{transform:scale(.98);}

  .ex{border:1px solid var(--line);background:var(--surface);border-radius:15px;padding:15px 16px;margin-bottom:12px;}
  .ex-top{display:flex;align-items:center;gap:12px;}
  .ex-n{font-family:var(--disp);font-weight:700;font-size:17px;width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;background:var(--bg);border:1px solid var(--line);color:var(--muted);}
  .ex-title{flex:1;font-family:var(--disp);text-transform:uppercase;letter-spacing:.06em;font-size:14.5px;font-weight:500;}
  .ex-go{appearance:none;border:1px solid var(--red);background:transparent;color:var(--red);font-family:var(--disp);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:11px;padding:8px 14px;border-radius:9px;cursor:pointer;transition:.16s;}
  .ex-go:active{background:var(--red);color:#fff;}
  .ex-desc{font-size:12.5px;color:var(--muted);line-height:1.5;margin:9px 0 0;}
  .ex-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;align-items:center;}
  .tag{font-size:10.5px;font-family:var(--disp);letter-spacing:.07em;text-transform:uppercase;color:var(--faint);background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:4px 8px;}
  .tag b{color:var(--text);font-weight:500;}
  .tag.warn{color:var(--amber);border-color:#5a4a1d;background:#241d0e;}
  .mini-target{width:22px;height:22px;flex:none;}

  #runner{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column;padding:calc(env(safe-area-inset-top) + 16px) 20px calc(env(safe-area-inset-bottom) + 22px);}
  #runner.show{display:flex;animation:fade .25s ease both;}
  .run-head{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .run-head .label{font-family:var(--disp);text-transform:uppercase;letter-spacing:.14em;font-size:11px;color:var(--faint);line-height:1.5;}
  .run-head .label b{color:var(--text);display:block;font-size:15px;letter-spacing:.05em;}
  .run-exit{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--muted);width:38px;height:38px;border-radius:10px;font-size:17px;cursor:pointer;flex:none;}

  .run-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .phase{font-family:var(--disp);text-transform:uppercase;letter-spacing:.3em;font-size:15px;font-weight:600;color:var(--muted);min-height:20px;transition:color .2s;text-align:center;}
  .ring-wrap{position:relative;width:min(76vw,310px);height:min(76vw,310px);}
  .ring-wrap>svg{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:var(--surface-2);stroke-width:13;}
  .ring-fg{fill:none;stroke:var(--green);stroke-width:13;stroke-linecap:round;transition:stroke .25s;}
  .ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .target-svg{position:absolute;width:62%;height:62%;left:19%;top:19%;opacity:.55;}
  .center-glow{position:absolute;width:54%;height:54%;left:23%;top:23%;border-radius:50%;background:radial-gradient(circle, rgba(8,9,11,.94) 0%, rgba(8,9,11,.72) 46%, transparent 72%);}
  .center-overlay{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
  .big-time{font-family:var(--mono);font-weight:600;font-size:clamp(48px,16vw,78px);line-height:.9;font-variant-numeric:tabular-nums;letter-spacing:-.02em;text-shadow:0 2px 18px rgba(0,0,0,.97);}
  .big-sub{font-family:var(--disp);text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:var(--faint);margin-top:7px;}

  .series-pips{display:flex;gap:9px;}
  .pip{width:10px;height:10px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);transition:.2s;}
  .pip.done{background:var(--red);border-color:var(--red);}
  .pip.active{box-shadow:0 0 0 4px rgba(226,0,26,.18);background:var(--red);border-color:var(--red);}

  .shotcount{font-family:var(--disp);text-transform:uppercase;letter-spacing:.08em;font-size:13px;color:var(--muted);text-align:center;}
  .shotcount b{color:var(--text);font-size:18px;}
  .mic-meter{width:min(60vw,230px);height:7px;border-radius:6px;background:var(--surface-2);overflow:hidden;border:1px solid var(--line);position:relative;}
  .mic-fill{height:100%;width:0%;background:var(--green);transition:width .04s linear;}
  .mic-thr{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--amber);}
  .mic-note{font-size:11px;color:var(--amber);text-align:center;max-width:280px;line-height:1.45;}

  .run-ctrl{display:flex;gap:12px;}
  .ctrl{flex:1;appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--text);font-family:var(--disp);text-transform:uppercase;letter-spacing:.1em;font-weight:500;font-size:13px;padding:17px;border-radius:14px;cursor:pointer;transition:.16s;}
  .ctrl:active{transform:scale(.97);}
  .ctrl.primary{background:linear-gradient(180deg,var(--red),var(--red-dim));border:none;color:#fff;font-weight:600;}
  .ctrl.go{background:linear-gradient(180deg,var(--green),#1c8d5d);border:none;color:#05130c;font-weight:700;}
  .ctrl.ghost{background:transparent;}
  .ctrl:disabled{opacity:.35;}

  #flash{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;pointer-events:none;}
  #flash.show{display:flex;}
  #flash .word{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:clamp(40px,13vw,80px);color:#fff;animation:pop .5s ease both;text-align:center;padding:0 12px;}
  @keyframes pop{0%{transform:scale(.7);opacity:0;}40%{transform:scale(1.06);opacity:1;}100%{transform:scale(1);opacity:1;}}

  #modal{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;}
  #modal.show{display:flex;animation:fade .2s ease both;}
  .sheet{width:100%;max-width:560px;max-height:90vh;overflow-y:auto;background:var(--bg2);border:1px solid var(--line);border-bottom:none;border-radius:20px 20px 0 0;padding:22px 20px calc(env(safe-area-inset-bottom) + 26px);animation:up .3s ease both;}
  @keyframes up{from{transform:translateY(100%);}to{transform:none;}}
  .sheet h2{font-family:var(--disp);text-transform:uppercase;letter-spacing:.12em;font-size:16px;margin:0 0 8px;}
  .row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid var(--line);gap:14px;}
  .row .rl{font-size:13.5px;}
  .row .rl small{display:block;color:var(--faint);font-size:11px;margin-top:2px;line-height:1.4;}
  .toggle{width:50px;height:29px;border-radius:20px;background:var(--surface-2);border:1px solid var(--line);position:relative;cursor:pointer;flex:none;transition:.2s;}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:23px;height:23px;border-radius:50%;background:#fff;transition:.2s;}
  .toggle.on{background:var(--red);border-color:var(--red);}
  .toggle.on::after{left:23px;}
  .seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;flex:none;}
  .seg button{appearance:none;border:none;background:transparent;color:var(--muted);font-family:var(--disp);letter-spacing:.06em;font-size:12px;padding:8px 13px;cursor:pointer;}
  .seg button.on{background:var(--red);color:#fff;}
  input[type=range]{width:130px;accent-color:var(--red);}
  .subpanel{border-top:1px solid var(--line);padding:14px 0 4px;display:none;}
  .subpanel.show{display:block;}
  .cal-btn{width:100%;border:1px solid var(--line);background:var(--surface);color:var(--text);font-family:var(--disp);letter-spacing:.08em;text-transform:uppercase;font-size:12.5px;font-weight:600;padding:13px;border-radius:11px;cursor:pointer;margin-top:4px;}
  .cal-status{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.45;}
  .cal-status b{color:var(--green);}
  .done-btn{width:100%;margin-top:18px;border:none;background:var(--surface);color:var(--text);font-family:var(--disp);letter-spacing:.12em;text-transform:uppercase;font-weight:600;font-size:13px;padding:15px;border-radius:13px;cursor:pointer;}
  .hint{font-size:11.5px;color:var(--faint);line-height:1.5;margin-top:14px;}
  .footnote{margin-top:26px;font-size:11px;color:var(--faint);line-height:1.55;text-align:center;}
</style>
</head>
<body>
<div id="app">
  <header>
    <svg class="mark" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="17" stroke="var(--text)"/><circle cx="20" cy="20" r="11" stroke="var(--muted)"/>
      <circle cx="20" cy="20" r="5" stroke="var(--red)"/><circle cx="20" cy="20" r="1.6" fill="var(--red)" stroke="none"/>
    </svg>
    <div class="brand"><h1>Moniteur de Tir</h1><p id="brandsub"></p></div>
    <button class="icon-btn" id="backBtn" style="display:none" aria-label="Back">‹</button>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings">⚙</button>
  </header>
  <main id="main"></main>
  <div class="footnote" data-i18n="footnote"></div>
</div>

<div id="runner">
  <div class="run-head"><div class="label" id="runLabel"></div><button class="run-exit" id="runExit" aria-label="Exit">✕</button></div>
  <div class="run-mid">
    <div class="phase" id="phaseLabel"></div>
    <div class="ring-wrap">
      <svg viewBox="0 0 310 310"><circle class="ring-bg" cx="155" cy="155" r="135"/><circle class="ring-fg" id="ringFg" cx="155" cy="155" r="135"/></svg>
      <div class="ring-center">
        <svg class="target-svg" id="targetSvg" viewBox="0 0 200 200"></svg>
        <div class="center-glow"></div>
        <div class="center-overlay"><div class="big-time" id="bigTime">0</div><div class="big-sub" id="bigSub"></div></div>
      </div>
    </div>
    <div class="series-pips" id="pips"></div>
    <div class="shotcount" id="shotCount" style="display:none"></div>
    <div class="mic-meter" id="micMeter" style="display:none"><div class="mic-fill" id="micFill"></div><div class="mic-thr" id="micThr"></div></div>
    <div class="mic-note" id="micNote" style="display:none"></div>
  </div>
  <div class="run-ctrl" id="runCtrl"></div>
</div>

<div id="flash"><div class="word" id="flashWord"></div></div>

<div id="modal">
  <div class="sheet">
    <h2 data-i18n="setTitle">Réglages</h2>
    <div class="row"><div class="rl"><span data-i18n="voiceLabel"></span><small data-i18n="voiceSub"></small></div><div class="toggle on" id="tgVoice"></div></div>
    <div class="row"><div class="rl"><span data-i18n="beepLabel"></span><small data-i18n="beepSub"></small></div><div class="toggle on" id="tgBeep"></div></div>
    <div class="row"><div class="rl"><span data-i18n="safetyLabel"></span><small data-i18n="safetySub"></small></div><div class="toggle on" id="tgSafety"></div></div>
    <div class="row"><div class="rl"><span data-i18n="langLabel"></span></div>
      <div class="seg" id="segLang"><button data-l="fr" class="on">FR</button><button data-l="de">DE</button><button data-l="en">EN</button></div></div>
    <div class="row"><div class="rl"><span data-i18n="prepLabel"></span><small><span id="prepVal">7</span> <span data-i18n="prepUnit"></span></small></div><input type="range" min="3" max="20" value="7" id="prepRange"></div>
    <div class="row"><div class="rl"><span data-i18n="listenLabel"></span><small data-i18n="listenSub"></small></div><div class="toggle" id="tgListen"></div></div>
    <div class="subpanel" id="listenPanel">
      <button class="cal-btn" id="calBtn" data-i18n="calBtn"></button>
      <div class="row" style="border:none;padding-top:14px"><div class="rl"><span data-i18n="sensLabel"></span><small data-i18n="sensSub"></small></div><input type="range" min="0.6" max="1.6" step="0.05" value="1" id="sensRange"></div>
      <div class="cal-status" id="calStatus" data-i18n="calStatusDefault"></div>
      <div class="hint" data-i18n="listenHint"></div>
    </div>
    <button class="done-btn" id="modalDone" data-i18n="doneBtn"></button>
    <div class="hint" data-i18n="iphoneHint"></div>
  </div>
</div>

<script>
"use strict";

const WEAPON = {
  rifle:{fr:"Fusil d'assaut 90/57 — couché, sur bipied", de:"Sturmgewehr 90/57 — liegend, auf Zweibein", en:"Assault rifle 90/57 — prone, on bipod"},
  pistol:{fr:"Pistolet — debout, à bras franc ou à deux mains", de:"Pistole — stehend, frei- oder beidhändig", en:"Pistol — standing, one or two hands"}
};
const TITLES = {
  cpc:{fr:"Tir coup par coup", de:"Einzelfeuer", en:"Single shot"},
  cpcr:{fr:"Coup par coup rapide", de:"Schnelles Einzelfeuer", en:"Rapid single shot"},
  rapide:{fr:"Tir rapide", de:"Schnellfeuer", en:"Rapid fire"},
  vitesse:{fr:"Tir de vitesse", de:"Schnellfeuer", en:"Speed fire"}
};
const D = { // desc snippets reused
  six6:{fr:"6 coups en 6 minutes, marqués après chaque coup",de:"6 Schuss in 6 Minuten, nach jedem Schuss angezeigt",en:"6 shots in 6 minutes, marked after each shot"},
  twoXthree:{fr:"2 × 3 coups en 60 s par série, marqués à la fin",de:"2 × 3 Schuss in 60 s pro Serie, am Ende angezeigt",en:"2 × 3 shots in 60 s per series, marked at the end"},
  six60end:{fr:"6 coups en 60 secondes, marqués à la fin",de:"6 Schuss in 60 Sekunden, am Ende angezeigt",en:"6 shots in 60 seconds, marked at the end"},
  six60ser:{fr:"6 coups en 60 secondes, marqués en fin de série",de:"6 Schuss in 60 Sekunden, am Serienende angezeigt",en:"6 shots in 60 seconds, marked at end of series"},
  three20:{fr:"3 coups, 20 secondes chacun, marqués séparément",de:"3 Schuss, je 20 Sekunden, einzeln angezeigt",en:"3 shots, 20 seconds each, marked separately"},
  prec5:{fr:"5 coups de précision",de:"5 Präzisionsschüsse",en:"5 precision shots"},
  rap300_3:{fr:"1 × 2 coups en 20 s puis 1 × 3 coups en 20 s, marqués à la fin",de:"1 × 2 Schuss in 20 s, dann 1 × 3 Schuss in 20 s, am Ende angezeigt",en:"1 × 2 shots in 20 s then 1 × 3 shots in 20 s, marked at the end"},
  rap300_4:{fr:"1 × 5 coups en 40 secondes, marqués à la fin",de:"1 × 5 Schuss in 40 Sekunden, am Ende angezeigt",en:"1 × 5 shots in 40 seconds, marked at the end"},
  p50e:{fr:"5 coups en 50 secondes, marqués à la fin",de:"5 Schuss in 50 Sekunden, am Ende angezeigt",en:"5 shots in 50 seconds, marked at the end"},
  p40e:{fr:"5 coups en 40 secondes, marqués à la fin",de:"5 Schuss in 40 Sekunden, am Ende angezeigt",en:"5 shots in 40 seconds, marked at the end"},
  p30e:{fr:"5 coups en 30 secondes, marqués à la fin",de:"5 Schuss in 30 Sekunden, am Ende angezeigt",en:"5 shots in 30 seconds, marked at the end"},
  o50_2:{fr:"1 × 5 coups en 60 secondes",de:"1 × 5 Schuss in 60 Sekunden",en:"1 × 5 shots in 60 seconds"},
  o50_4:{fr:"1 × 5 coups en 30 secondes",de:"1 × 5 Schuss in 30 Sekunden",en:"1 × 5 shots in 30 seconds"}
};

const PROGRAMS = {
  campagne:{ short:"TFC",
    label:{fr:"Tir en Campagne",de:"Feldschiessen",en:"Field Shooting"},
    blurb:{fr:"« La participation prime le rang » — sans licence. Programme non interruptible.",
           de:"« Mitmachen zählt mehr als Rang » — ohne Lizenz. Programm ohne Unterbruch.",
           en:"'Taking part counts more than rank' — no licence. Runs without interruption."},
    distances:{
      "300":{ weapon:WEAPON.rifle, spoken:"300 mètres", max:72,
        ex:[ {n:1,tkey:"cpc",desc:D.six6,target:"B4",shots:6,score:24,timed:true,series:[{shots:6,seconds:360,markEach:true}]},
             {n:2,tkey:"cpcr",desc:D.twoXthree,target:"B4",shots:6,score:24,timed:true,series:[{shots:3,seconds:60},{shots:3,seconds:60}]},

/* ============ CIBLES — d'après les photos fournies ============ */
const TARGETS = {
  A5:    {shape:"square", label:"A 5", rings:[96,84,72,60,48,36,26], bull:18, cross:true},     // cible A5 précision 300m
  B4:    {shape:"figure", label:"B 4",   rings:[58,46,34,24], bull:16},                          // cible de campagne (silhouette)
  B5:    {shape:"circle", label:"B 5",   rings:[94,82,70,58,46,34,24], bull:16},                 // ronde pistolet 50m
  P4:    {shape:"circle", label:"P 4",   rings:[96,78,60,42], bull:38, cross:true},              // pistolet précision 50m
  pistol:{shape:"oval",   label:"25 m",  ovals:[[56,92],[45,75],[34,58],[24,41]], bull:[13,21]}  // ovale vitesse d'ordonnance 25m
};
function targetKey(t){ return TARGETS[t]?t:"B4"; }
function ringC(r,i,n){ return `<circle cx="100" cy="100" r="${r}" fill="none" stroke="var(--muted)" stroke-width="${i===0?2:1.2}" opacity="${(0.3+0.5*(i/n)).toFixed(2)}"/>`; }
function bullCircle(r){ return `<circle cx="100" cy="100" r="${r}" fill="var(--red)" opacity=".22" stroke="var(--red)" stroke-width="1.2"/>`; }
function crossMark(){ return `<line x1="91" y1="100" x2="109" y2="100" stroke="var(--red)" stroke-width="1.3"/><line x1="100" y1="91" x2="100" y2="109" stroke="var(--red)" stroke-width="1.3"/>`; }
function targetSVG(t){
  const T=TARGETS[targetKey(t)]; let s="";
  if(T.shape==="square"){
    s+=`<rect x="11" y="11" width="178" height="178" rx="4" fill="none" stroke="var(--faint)" stroke-width="1.4" opacity=".6"/>`;
    s+=`<circle cx="100" cy="100" r="${T.rings[0]}" fill="var(--text)" opacity=".06"/>`;
    T.rings.forEach((r,i)=>s+=ringC(r,i,T.rings.length)); s+=bullCircle(T.bull);
  } else if(T.shape==="circle"){
    s+=`<circle cx="100" cy="100" r="${T.rings[0]}" fill="var(--text)" opacity=".05"/>`;
    T.rings.forEach((r,i)=>s+=ringC(r,i,T.rings.length)); s+=bullCircle(T.bull);
  } else if(T.shape==="oval"){
    s+=`<ellipse cx="100" cy="100" rx="${T.ovals[0][0]}" ry="${T.ovals[0][1]}" fill="var(--text)" opacity=".05"/>`;
    T.ovals.forEach((o,i)=>s+=`<ellipse cx="100" cy="100" rx="${o[0]}" ry="${o[1]}" fill="none" stroke="var(--muted)" stroke-width="${i===0?2:1.2}" opacity="${(0.3+0.5*(i/T.ovals.length)).toFixed(2)}"/>`);
    s+=`<ellipse cx="100" cy="100" rx="${T.bull[0]}" ry="${T.bull[1]}" fill="var(--red)" opacity=".22" stroke="var(--red)" stroke-width="1.2"/>`;
  } else if(T.shape==="figure"){
    // silhouette de cible de campagne : corps + tête
    s+=`<g opacity=".9"><rect x="58" y="58" width="84" height="98" rx="9" fill="var(--field)" opacity=".16" stroke="var(--muted)" stroke-width="1.4"/>`;
    s+=`<rect x="83" y="38" width="34" height="26" rx="5" fill="var(--field)" opacity=".16" stroke="var(--muted)" stroke-width="1.4"/></g>`;
    T.rings.forEach((r,i)=>s+=ringC(r,i,T.rings.length)); s+=bullCircle(T.bull);
  }
  if(T.cross) s+=crossMark();
  s+=`<text x="100" y="${T.shape==='oval'?188:190}" text-anchor="middle" font-family="var(--disp)" font-size="13" letter-spacing="1.5" fill="var(--muted)" opacity=".9">${T.label}</text>`;
  return s;
}
function miniTarget(t){
  const T=TARGETS[targetKey(t)];
  if(T.shape==="oval") return `<svg class="mini-target" viewBox="0 0 200 200">
    <ellipse cx="100" cy="100" rx="64" ry="96" fill="none" stroke="var(--faint)" stroke-width="7"/>
    <ellipse cx="100" cy="100" rx="40" ry="60" fill="none" stroke="var(--faint)" stroke-width="7"/>
    <ellipse cx="100" cy="100" rx="16" ry="24" fill="var(--red)"/></svg>`;
  if(T.shape==="figure") return `<svg class="mini-target" viewBox="0 0 200 200">
    <rect x="52" y="58" width="96" height="104" rx="12" fill="none" stroke="var(--faint)" stroke-width="8"/>
    <rect x="80" y="30" width="40" height="34" rx="6" fill="none" stroke="var(--faint)" stroke-width="8"/>
    <circle cx="100" cy="108" r="20" fill="var(--red)"/></svg>`;
  const sq=T.shape==="square";
  return `<svg class="mini-target" viewBox="0 0 200 200">
    ${sq?`<rect x="14" y="14" width="172" height="172" rx="8" fill="none" stroke="var(--faint)" stroke-width="7"/>`:``}
    <circle cx="100" cy="100" r="78" fill="none" stroke="var(--faint)" stroke-width="8"/>
    <circle cx="100" cy="100" r="48" fill="none" stroke="var(--faint)" stroke-width="8"/>
    <circle cx="100" cy="100" r="22" fill="var(--red)"/></svg>`;
}

function rerender(){ if(nav.dist)renderProgram(nav.mode,nav.dist); else if(nav.mode)renderDistances(nav.mode); else renderHome(); }
function renderHome(){
  nav={mode:null,dist:null}; showBack(false); setBrand(ui().brandSub);
  main.innerHTML=`<p class="crumb">${ui().chooseMode}</p><div class="stack">
    ${Object.entries(PROGRAMS).map(([k,p])=>`<button class="card" data-mode="${k}"><span class="ringghost"></span>
      <div class="kicker">${p.short}</div><div class="title">${labelOf(p)}</div><div class="sub">${p.blurb[settings.lang]}</div><div class="arrow">›</div></button>`).join("")}</div>`;
  main.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>renderDistances(b.dataset.mode));
}
function renderDistances(mode){
  nav={mode,dist:null}; showBack(true); setBrand(labelOf(PROGRAMS[mode]));
  const p=PROGRAMS[mode];
  main.innerHTML=`<p class="crumb"><b>${p.short}</b> · ${ui().chooseDist}</p><div class="dist-grid">
    ${Object.entries(p.distances).map(([d,info])=>{ const w=weaponOf(info).split("—");
      return `<button class="card dist-card" data-dist="${d}"><div class="dist-num">${d}<span> m</span></div>

  main.querySelectorAll("[data-dist]").forEach(b=>b.onclick=()=>renderProgram(mode,b.dataset.dist));
}
function renderProgram(mode,dist){
  nav={mode,dist}; showBack(true);
  const p=PROGRAMS[mode], info=p.distances[dist]; setBrand(`${p.short} · ${dist} m`);
  main.innerHTML=`<p class="crumb"><b>${p.short}</b> › ${dist} m</p>
    <div class="prog-head"><div><div class="h">${dist} ${ui().metres}</div><div class="meta">${weaponOf(info)}</div></div>
    <div class="badge-score">MAX<br><b>${info.max}</b> ${ui().pts}</div></div>
    <button class="startall" id="startAll">${ui().startAll}</button><div id="exList"></div>`;
  const list=$("#exList");
  info.ex.forEach((ex,i)=>{
    const div=document.createElement("div"); div.className="ex";
    let tags=`${miniTarget(ex.target)}<span class="tag"><b>${ex.shots}</b> ${ui().tagShots}</span>
      <span class="tag">${ui().tagTarget} <b>${TARGETS[targetKey(ex.target)].label}</b></span>
      <span class="tag"><b>${ex.score}</b> ${ui().ptsMax}</span>`;
    if(!ex.timed) tags+=`<span class="tag warn">${ui().tagPrecision}</span>`;
    div.innerHTML=`<div class="ex-top"><div class="ex-n">${ex.n}</div><div class="ex-title">${titleOf(ex)}</div>
      <button class="ex-go">${ui().shoot}</button></div><p class="ex-desc">${descOf(ex)}</p><div class="ex-tags">${tags}</div>`;
    div.querySelector(".ex-go").onclick=()=>startDrill(mode,dist,[i]);
    list.appendChild(div);
  });
  $("#startAll").onclick=()=>startDrill(mode,dist,info.ex.map((_,i)=>i));
}

/* ============ AUDIO ============ */
let audioCtx=null;
function initAudio(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(audioCtx&&audioCtx.state==="suspended")audioCtx.resume(); }
function beep(f=880,d=.12,v=.5,t="square"){ if(!settings.beep||!audioCtx)return; try{ const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+d);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}catch(e){} }
const tickBeep=()=>beep(660,.07,.35,"sine");
const goBeep=()=>beep(1100,.18,.6,"square");
const haltBeep=()=>{beep(440,.16,.55,"square");setTimeout(()=>beep(330,.22,.55,"square"),170);};

/* ============ VOIX ============ */
let voices={};
function pickVoices(){ const vs=speechSynthesis.getVoices();
  voices.fr=vs.find(v=>/fr-FR/i.test(v.lang))||vs.find(v=>/^fr/i.test(v.lang))||null;
  voices.de=vs.find(v=>/de-CH/i.test(v.lang))||vs.find(v=>/de-DE/i.test(v.lang))||vs.find(v=>/^de/i.test(v.lang))||null;
  voices.en=vs.find(v=>/en-GB/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||null; }
if("speechSynthesis" in window){ pickVoices(); speechSynthesis.onvoiceschanged=pickVoices; }
function say(text){ if(!settings.voice||!("speechSynthesis" in window)||!text)return; try{ speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang=settings.lang==="fr"?"fr-FR":settings.lang==="de"?"de-CH":"en-GB";
  const v=voices[settings.lang]; if(v)u.voice=v; u.rate=1;u.pitch=1; speechSynthesis.speak(u);}catch(e){} }
function primeVoice(){ if(!("speechSynthesis" in window))return; try{ const u=new SpeechSynthesisUtterance(" ");u.volume=0;speechSynthesis.speak(u);}catch(e){} }

/* ============ WAKE LOCK ============ */
let wakeLock=null;
async function lockScreen(){ try{ if("wakeLock" in navigator) wakeLock=await navigator.wakeLock.request("screen"); }catch(e){} }
function unlockScreen(){ try{ if(wakeLock){wakeLock.release();wakeLock=null;} }catch(e){} }
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible"&&runner.classList.contains("show"))lockScreen(); });

/* ============ DÉTECTION ACOUSTIQUE ============ */
const Mic={ stream:null, analyser:null, data:null, raf:null, running:false, onShot:null, lastShot:0, threshold:.4, level:0,
  async start(){ if(this.running)return true; if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return false;
    try{ this.stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});}catch(e){return false;}
    initAudio(); if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(this.stream); this.analyser=audioCtx.createAnalyser(); this.analyser.fftSize=1024;
    this.data=new Float32Array(this.analyser.fftSize); src.connect(this.analyser); this.running=true; this.loop(); return true; },
  loop(){ if(!this.running)return; this.analyser.getFloatTimeDomainData(this.data);
    let peak=0; for(let i=0;i<this.data.length;i++){ const a=Math.abs(this.data[i]); if(a>peak)peak=a; } this.level=peak;
    if(micFill){ micFill.style.width=Math.min(100,peak*100)+"%"; micFill.style.background=peak>=this.threshold?"var(--red)":"var(--green)"; }
    const now=performance.now(); if(peak>=this.threshold&&(now-this.lastShot)>170){ this.lastShot=now; if(this.onShot)this.onShot(peak); }
    this.raf=requestAnimationFrame(()=>this.loop()); },
  stop(){ this.running=false; if(this.raf)cancelAnimationFrame(this.raf); this.onShot=null; if(this.stream){this.stream.getTracks().forEach(t=>t.stop());this.stream=null;} } };
function effThreshold(){ return Math.min(.97,Math.max(.08,settings.calBase/settings.sensitivity)); }

/* =========================================================
   MOTEUR DE CHRONO
   ========================================================= */
const runner=$("#runner"), ringFg=$("#ringFg"), bigTime=$("#bigTime"), bigSub=$("#bigSub"), phaseLabel=$("#phaseLabel"),
      runLabel=$("#runLabel"), runCtrl=$("#runCtrl"), pips=$("#pips"), shotCount=$("#shotCount"), flash=$("#flash"),
      flashWord=$("#flashWord"), targetSvg=$("#targetSvg"), micMeter=$("#micMeter"), micFill=$("#micFill"), micThr=$("#micThr"), micNote=$("#micNote");
const RING_C=2*Math.PI*135; ringFg.style.strokeDasharray=RING_C;
function fmtTime(s){ s=Math.max(0,Math.ceil(s-1e-4)); if(s>=60){const m=Math.floor(s/60),r=s%60;return m+":"+String(r).padStart(2,"0");} return String(s); }
function setRing(frac,color){ ringFg.style.strokeDashoffset=RING_C*(1-frac); if(color)ringFg.style.stroke=color; }
function setPhase(txt,color){ phaseLabel.textContent=txt; phaseLabel.style.color=color||"var(--muted)"; }
function showFlash(word,color){ flashWord.textContent=word; flashWord.style.color=color||"#fff"; flash.classList.add("show");
  flashWord.style.animation="none"; void flashWord.offsetWidth; flashWord.style.animation="pop .5s ease both"; setTimeout(()=>flash.classList.remove("show"),650); }

let rafId=null, timerState=null, drill=null;
function startCountdown(seconds,{onTick,onDone,colorScale=true}){ cancelTimers(); const total=seconds*1000;
  timerState={total,remaining:total,deadline:performance.now()+total,paused:false,onTick,onDone,colorScale}; loop(); }
function loop(){ if(!timerState)return;
  const rem=timerState.paused?timerState.remaining:Math.max(0,timerState.deadline-performance.now());
  const secLeft=rem/1000, frac=timerState.total?rem/timerState.total:0;
  let color="var(--green)"; if(timerState.colorScale){ if(secLeft<=3)color="var(--red)"; else if(secLeft<=10)color="var(--amber)"; }
  setRing(frac,color); bigTime.textContent=fmtTime(secLeft);
  if(timerState.onTick)timerState.onTick(Math.ceil(secLeft-1e-4),secLeft);
  if(rem<=0){ const d=timerState.onDone; timerState=null; if(d)d(); return; } rafId=requestAnimationFrame(loop); }
function pauseTimer(){ if(timerState&&!timerState.paused){timerState.paused=true;timerState.remaining=Math.max(0,timerState.deadline-performance.now());cancelAnimationFrame(rafId);} }
function resumeTimer(){ if(timerState&&timerState.paused){timerState.paused=false;timerState.deadline=performance.now()+timerState.remaining;loop();} }
function cancelTimers(){ if(rafId)cancelAnimationFrame(rafId); rafId=null; timerState=null; if(drill&&drill.to)clearTimeout(drill.to); }

function startDrill(mode,dist,indexes){ initAudio(); primeVoice(); lockScreen(); queue=indexes.map(i=>({mode,dist,i})); qIndex=0; runner.classList.add("show"); runExercise(); }
function runExercise(){
  const q=queue[qIndex], P=PROGRAMS[q.mode], info=P.distances[q.dist], ex=info.ex[q.i];
  drill={ex,seg:0,shotsFired:0,detected:0,to:null,mode:q.mode,dist:q.dist};
  runLabel.innerHTML=`${P.short} · ${q.dist} m · ${ui().exWord} ${ex.n}/${info.ex.length}<b>${titleOf(ex)}</b>`;
  targetSvg.innerHTML=targetSVG(ex.target);
  buildPips(ex); shotCount.style.display="none"; micMeter.style.display="none"; micNote.style.display="none";
  setPhase(ui().getReady,"var(--amber)"); setRing(1,"var(--amber)"); bigTime.textContent="•"; bigSub.textContent="";
  setCtrl([{label:ui().prepare,cls:"go",fn:beginExercise}]);
  const sd=say0().dist[q.dist]||info.spoken;
  say(say0().announce(say0().prog[q.mode],sd,ex.n,titleOf(ex)));
}
function buildPips(ex){ pips.innerHTML=""; const c=ex.timed?ex.series.length:0; for(let i=0;i<c;i++){const d=document.createElement("div");d.className="pip";pips.appendChild(d);} }
function markPips(seg,active){ [...pips.children].forEach((p,i)=>{p.classList.toggle("done",i<seg);p.classList.toggle("active",i===seg&&active);}); }
function setCtrl(btns){ runCtrl.innerHTML=""; btns.forEach(b=>{const el=document.createElement("button");el.className="ctrl "+(b.cls||"");el.textContent=b.label;if(b.disabled)el.disabled=true;el.onclick=b.fn;runCtrl.appendChild(el);}); }

async function beginExercise(){
  initAudio();
  if(settings.listen){ Mic.threshold=effThreshold(); const ok=await Mic.start();
    if(ok){ micMeter.style.display="block"; micThr.style.left=Math.min(100,Mic.threshold*100)+"%";
      Mic.onShot=()=>{ drill.detected++; tickBeep(); updateCounts(); if(!drill.ex.timed&&drill.detected>=drill.ex.shots)finishExercise(); }; }
    else { micNote.textContent=ui().micFail; micNote.style.display="block"; } }
  if(settings.safety){ say(say0().load); showFlash(ui().flashLoad,"var(--amber)"); setPhase(ui().load,"var(--amber)"); drill.to=setTimeout(afterLoad,1500); }
  else afterLoad();
}
function afterLoad(){ if(!drill.ex.timed)runPrecision(); else prepareSeries(0,true); }
function updateCounts(){ const ex=drill.ex;
  if(settings.listen){ shotCount.style.display="block"; shotCount.innerHTML=`${ui().detected}: <b>${drill.detected}</b> / ${ex.shots}`+(ex.timed?` · ${ui().listening}`:``); }
  else if(!ex.timed){ shotCount.style.display="block"; shotCount.innerHTML=`${ui().shots}: <b>${drill.shotsFired}</b> / ${ex.shots}`; } }

function runPrecision(){ const ex=drill.ex; setPhase(ui().precision,"var(--green)"); setRing(1,"var(--green)");
  bigTime.textContent="∞"; bigSub.textContent=ui().pace; drill.shotsFired=0; drill.detected=0; updateCounts();
  goBeep(); say(say0().precision(ex.shots));
  setCtrl([{label:ui().shotFired,cls:"primary",fn:()=>{ if(drill.shotsFired<ex.shots){drill.shotsFired++;tickBeep();updateCounts(); if(drill.shotsFired>=ex.shots&&!settings.listen)finishExercise();} }},
    {label:ui().finish,cls:"ghost",fn:finishExercise}]); }

function prepareSeries(segIndex,first){ const ex=drill.ex, s=ex.series[segIndex], L=say0();
  drill.seg=segIndex; markPips(segIndex,true); say(L.series(segIndex+1,ex.series.length,s.shots,s.seconds));
  if(settings.listen)updateCounts(); else shotCount.style.display="none";
  bigSub.textContent=ui().prepSub; setPhase(ui().getReady,"var(--amber)"); setRing(1,"var(--amber)");
  setCtrl([{label:ui().pause,cls:"ghost",disabled:true,fn:()=>{}}]);
  const prepSec=first?settings.prep:Math.min(settings.prep,4);
  drill.to=setTimeout(()=>{ say(first?L.ready:L.attention);
    startCountdown(prepSec,{colorScale:false,onTick:sh=>{bigTime.textContent=sh;if(sh<=3&&sh>0)tickBeep();},onDone:()=>fireSeries(segIndex)}); }, first?1500:950); }
function fireSeries(segIndex){ const ex=drill.ex, s=ex.series[segIndex], L=say0();
  goBeep(); showFlash(ui().flashFire,"var(--green)"); say(L.fire); setPhase(ui().fireRun,"var(--red)"); bigSub.textContent=ui().remaining;
  let paused=false; const draw=()=>setCtrl([{label:paused?ui().resume:ui().pause,cls:"ghost",fn:()=>{paused=!paused;if(paused)pauseTimer();else resumeTimer();draw();}}]); draw();
  startCountdown(s.seconds,{onTick:sh=>{if(sh<=3&&sh>0)tickBeep();},onDone:()=>endSeries(segIndex)}); }
function endSeries(segIndex){ const ex=drill.ex, L=say0(); haltBeep(); showFlash(ui().flashHalt,"var(--red)"); say(L.halt);
  setPhase(ui().halt,"var(--red)"); setRing(0,"var(--red)"); bigTime.textContent="0"; markPips(segIndex+1,false);
  if(segIndex+1<ex.series.length) setCtrl([{label:ui().nextSeries,cls:"go",fn:()=>prepareSeries(segIndex+1,false)}]); else finishExercise(); }
function finishExercise(){ cancelTimers();
  const proceed=()=>{ setRing(1,"var(--green)"); bigTime.textContent="✓"; bigSub.textContent=""; const ex=drill.ex; markPips(ex.timed?ex.series.length:0,false);
    if(settings.listen){ shotCount.style.display="block"; shotCount.innerHTML=`${ui().detected}: <b>${drill.detected}</b> / ${ex.shots}`; }
    const hasNext=qIndex<queue.length-1;
    if(hasNext){ setPhase(ui().exDone,"var(--green)");
      setCtrl([{label:ui().nextEx,cls:"go",fn:()=>{ if(settings.listen){Mic.stop();micMeter.style.display="none";} qIndex++; say(say0().next); setTimeout(runExercise,500); }},
        {label:ui().exit,cls:"ghost",fn:exitRunner}]);
    } else { say(say0().done); setPhase(ui().progDone,"var(--green)"); setCtrl([{label:ui().finish,cls:"primary",fn:exitRunner}]); } };
  if(settings.safety){ say(say0().unload); showFlash(ui().flashUnload,"var(--amber)"); setPhase(ui().unload,"var(--amber)"); setRing(1,"var(--amber)"); bigTime.textContent="✓"; drill.to=setTimeout(proceed,1600); }
  else proceed(); }
function exitRunner(){ cancelTimers(); if(drill&&drill.to)clearTimeout(drill.to); if("speechSynthesis" in window)speechSynthesis.cancel();
  Mic.stop(); micMeter.style.display="none"; micNote.style.display="none"; unlockScreen(); runner.classList.remove("show"); drill=null; }

/* ============ navigation & réglages ============ */
backBtn.onclick=()=>{ if(nav.dist)renderDistances(nav.mode); else if(nav.mode)renderHome(); };
$("#runExit").onclick=exitRunner;
const modal=$("#modal");
$("#settingsBtn").onclick=()=>{ initAudio(); modal.classList.add("show"); };
$("#modalDone").onclick=()=>{ modal.classList.remove("show"); if(!runner.classList.contains("show"))Mic.stop(); };
modal.onclick=e=>{ if(e.target===modal){ modal.classList.remove("show"); if(!runner.classList.contains("show"))Mic.stop(); } };
function bindToggle(id,key,after){ const t=$(id); t.classList.toggle("on",settings[key]); t.onclick=()=>{ settings[key]=!settings[key]; t.classList.toggle("on",settings[key]); if(after)after(); }; }
bindToggle("#tgVoice","voice",()=>{ if(settings.voice)primeVoice(); });
bindToggle("#tgBeep","beep");
bindToggle("#tgSafety","safety");
bindToggle("#tgListen","listen",()=>{ $("#listenPanel").classList.toggle("show",settings.listen); });
$("#segLang").querySelectorAll("button").forEach(b=>b.onclick=()=>{ settings.lang=b.dataset.l;
  $("#segLang").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b)); applyI18n(); rerender(); });
$("#prepRange").oninput=e=>{ settings.prep=+e.target.value; $("#prepVal").textContent=settings.prep; };
$("#sensRange").oninput=e=>{ settings.sensitivity=+e.target.value; };

$("#calBtn").onclick=async()=>{ const L=ui(); calStatus.textContent=L.calStarting; Mic.threshold=.12; const ok=await Mic.start();
  if(!ok){ calStatus.textContent=L.calMicFail; return; }
  const peaks=[]; let n=0; calStatus.textContent=L.calFire(0);
  Mic.onShot=p=>{ peaks.push(p); n++; calStatus.textContent=L.calFire(n);
    if(n>=3){ Mic.onShot=null; settings.calBase=Math.max(.12,Math.min(...peaks)*0.7); settings.calibrated=true; Mic.stop(); calStatus.textContent=L.calOk; } };
  setTimeout(()=>{ if(Mic.running&&n<3){ Mic.stop(); if(n===0)calStatus.textContent=L.calNone;
    else { settings.calBase=Math.max(.12,Math.min(...peaks)*0.7); settings.calibrated=true; calStatus.textContent=L.calOkN(n); } } },25000); };

applyI18n();
renderHome();
</script>
